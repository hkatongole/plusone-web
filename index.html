<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>PlusOne Analytics</title>
  <meta name="description" content="Football match, team, player, odds, and prediction analytics." />
  <meta name="theme-color" content="#0B0C10" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="assets/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
  <link rel="stylesheet" href="assets/css/fonts.css" />
  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div id="splash" class="splash">
    <div class="splash__mark">+1</div>
    <p>Loading PlusOne Analytics&hellip;</p>
  </div>

  <div id="app-shell" class="app-shell">
    <header class="app-header">
      <a class="app-header__brand" href="#/">
        <span class="app-header__mark">+1</span>
        <span class="app-header__name">PlusOne Analytics</span>
      </a>

      <nav class="app-header__nav">
        <a href="#/" data-nav="/">Today</a>
        <a href="#/matches" data-nav="/matches">Matches</a>
        <a href="#/teams" data-nav="/teams">Teams</a>
        <a href="#/players" data-nav="/players">Players</a>
        <a href="#/leagues" data-nav="/leagues">Leagues</a>
        <a href="#/predictions" data-nav="/predictions">Predictions</a>
        <a href="#/value-bets" data-nav="/value-bets">Value Bets</a>
        <a href="#/model-performance" data-nav="/model-performance">Performance</a>
      </nav>

      <div class="app-header__status">
        <span id="db-status" class="db-status">No database loaded</span>
        <label class="app-header__import" title="Import a .sqlite backup">
          <input type="file" id="db-file-input" accept=".sqlite,.db" hidden />
          <span>Import DB</span>
        </label>
      </div>
    </header>

    <main id="app-outlet" class="app-outlet" aria-live="polite"></main>

    <footer class="app-footer">
      <p>Informational analytics only &mdash; not betting advice. <span title="Not built yet">Terms</span> &middot; <span title="Not built yet">Privacy</span></p>
    </footer>

    <nav class="bottom-nav" id="bottom-nav">
      <a href="#/" data-nav="/" class="bottom-nav__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
        <span>Today</span>
      </a>
      <a href="#/matches" data-nav="/matches" class="bottom-nav__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18"/><path d="M8 2v4M16 2v4"/></svg>
        <span>Matches</span>
      </a>
      <a href="#/teams" data-nav="/teams" class="bottom-nav__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l8 3v6c0 5-3.5 8.5-8 11-4.5-2.5-8-6-8-11V5l8-3z"/></svg>
        <span>Teams</span>
      </a>
      <a href="#/players" data-nav="/players" class="bottom-nav__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-7 8-7s8 2.6 8 7"/></svg>
        <span>Players</span>
      </a>
      <a href="#/leagues" data-nav="/leagues" class="bottom-nav__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4h10v5a5 5 0 0 1-10 0V4z"/><path d="M7 6H4a2 2 0 0 0 2 4M17 6h3a2 2 0 0 1-2 4"/><path d="M12 15v3M9 21h6M9 21v-3h6v3"/></svg>
        <span>Leagues</span>
      </a>
      <a href="#/predictions" data-nav="/predictions" class="bottom-nav__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V10M12 20V4M20 20v-7"/></svg>
        <span>Odds</span>
      </a>
      <a href="#/value-bets" data-nav="/value-bets" class="bottom-nav__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1" fill="currentColor"/></svg>
        <span>Value</span>
      </a>
      <a href="#/model-performance" data-nav="/model-performance" class="bottom-nav__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l6-6 4 4 8-8"/><path d="M15 7h6v6"/></svg>
        <span>Performance</span>
      </a>
    </nav>
  </div>

  <script src="database/sql-wasm.js"></script>
  <script type="module" src="assets/js/app.js"></script>
</body>
</html>
